{% extends 'base.html' %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="nova-panel">
            <h2 class="mb-4 text-center">Log In</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    {{ form.password }}
                </div>

                {% if form.errors %}
                    <div class="alert alert-nova-error">Incorrect username or password.</div>
                {% endif %}

                <button type="submit" class="btn btn-nova w-100 mt-2">Log in</button>
            </form>
            <p class="text-center text-muted-nova mt-3 mb-0">
                Don't have an account? <a href="{% url 'accounts:signup' %}" class="text-decoration-underline" style="color: var(--accent-2);">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
